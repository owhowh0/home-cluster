apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: authentik
spec:
  interval: 1h
  chart:
    spec:
      chart: authentik
      version: "2026.2.x"
      sourceRef:
        kind: HelmRepository
        name: authentik
        namespace: flux-system
  values:
    authentik:
      error_reporting:
        enabled: false
    postgresql:
      enabled: true
      primary:
        nodeSelector:
          kubernetes.io/hostname: asus-4gb
    redis:
      enabled: true
    server:
      nodeSelector:
        kubernetes.io/hostname: acer-8gb
      resources:
        requests:
          memory: 512Mi
          cpu: 100m
        limits:
          memory: 1.5Gi
    worker:
      nodeSelector:
        kubernetes.io/hostname: acer-8gb
      resources:
        requests:
          memory: 512Mi
          cpu: 100m
        limits:
          memory: 1Gi
  valuesFrom:
    - kind: Secret
      name: authentik-secret
      valuesKey: AUTHENTIK_SECRET_KEY
      targetPath: authentik.secret_key
    - kind: Secret
      name: authentik-secret
      valuesKey: AUTHENTIK_POSTGRESQL__PASSWORD
      targetPath: authentik.postgresql.password
    - kind: Secret
      name: authentik-secret
      valuesKey: AUTHENTIK_POSTGRESQL__PASSWORD
      targetPath: postgresql.auth.password
