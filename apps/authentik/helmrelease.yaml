apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: authentik
spec:
  interval: 1h
  chart:
    spec:
      chart: authentik
      version: "2024.x.x"
      sourceRef:
        kind: HelmRepository
        name: authentik
        namespace: flux-system
  values:
    authentik:
      secret_key:
        valueFrom:
          secretKeyRef:
            name: authentik-secret
            key: AUTHENTIK_SECRET_KEY
      postgresql:
        password:
          valueFrom:
            secretKeyRef:
              name: authentik-secret
              key: AUTHENTIK_POSTGRESQL__PASSWORD
      redis:
        password:
          valueFrom:
            secretKeyRef:
              name: authentik-secret
              key: AUTHENTIK_REDIS__PASSWORD
    postgresql:
      enabled: true
      auth:
        password:
          valueFrom:
            secretKeyRef:
              name: authentik-secret
              key: AUTHENTIK_POSTGRESQL__PASSWORD
    redis:
      enabled: true
      auth:
        password:
          valueFrom:
            secretKeyRef:
              name: authentik-secret
              key: AUTHENTIK_REDIS__PASSWORD
    resources:
      server:
        requests:
          memory: 512Mi
          cpu: 100m
        limits:
          memory: 1Gi
      worker:
        requests:
          memory: 256Mi
          cpu: 50m
        limits:
          memory: 512Mi
